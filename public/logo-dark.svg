<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="purple-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C3AED" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="cyan-magenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Left Bracket & Arm of Y -->
  <path d="M32 24 L18 38 L32 52" stroke="url(#purple-blue)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M18 38 L50 62" stroke="url(#purple-blue)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Bracket & Arm of Y -->
  <path d="M68 24 L82 38 L68 52" stroke="url(#cyan-magenta)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M82 38 L50 62" stroke="url(#cyan-magenta)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Stem of Y representing growth -->
  <path d="M50 62 L50 86" stroke="url(#purple-blue)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Center AI Node (Sparkle) with Glow -->
  <circle cx="50" cy="62" r="5" fill="#FFFFFF" filter="url(#glow)" />
</svg>
